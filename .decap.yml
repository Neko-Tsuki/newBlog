backend:
    name: github
    repo: Neko-Tsuki/newBlog
    branch: master
    site_domain: blog.shika-mori.top
    base_url: https://blog.shika-mori.top
    auth_endpoint: oauth

media_folder: public/assets/images
public_folder: /assets/images

collections:
    - name: "posts"
      label: "文章 (Markdown)"
      label_singular: "文章"
      folder: "src/content/posts"
      create: true
      delete: true
      extension: md
      format: frontmatter
      slug: "{{title}}"
      preview_path: "posts/{{title}}"
      filter: { field: "extension", value: "md" }
      fields:
          - { label: "标题", name: "title", widget: "string" }
          - { label: "发布日期", name: "published", widget: "datetime", format: "YYYY-MM-DD" }
          - { label: "更新日期", name: "updated", widget: "datetime", format: "YYYY-MM-DD", required: false }
          - { label: "草稿", name: "draft", widget: "boolean", default: false, required: false }
          - { label: "摘要", name: "description", widget: "text", required: false }
          - { label: "封面图片", name: "image", widget: "string", required: false }
          - { label: "标签", name: "tags", widget: "list", required: false }
          - { label: "分类", name: "category", widget: "string", required: false }
          - { label: "语言", name: "lang", widget: "select", options: ["", "zh_CN", "en", "ja", "zh_TW", "ru"], default: "", required: false }
          - { label: "置顶", name: "pinned", widget: "boolean", default: false, required: false }
          - { label: "启用评论", name: "comment", widget: "boolean", default: true, required: false }
          - { label: "作者", name: "author", widget: "string", required: false }
          - { label: "正文", name: "body", widget: "markdown" }

    - name: "posts-mdx"
      label: "文章 (MDX)"
      label_singular: "文章"
      folder: "src/content/posts"
      create: true
      delete: true
      extension: mdx
      format: frontmatter
      slug: "{{title}}"
      preview_path: "posts/{{title}}"
      filter: { field: "extension", value: "mdx" }
      fields:
          - { label: "标题", name: "title", widget: "string" }
          - { label: "发布日期", name: "published", widget: "datetime", format: "YYYY-MM-DD" }
          - { label: "更新日期", name: "updated", widget: "datetime", format: "YYYY-MM-DD", required: false }
          - { label: "草稿", name: "draft", widget: "boolean", default: false, required: false }
          - { label: "摘要", name: "description", widget: "text", required: false }
          - { label: "封面图片", name: "image", widget: "string", required: false }
          - { label: "标签", name: "tags", widget: "list", required: false }
          - { label: "分类", name: "category", widget: "string", required: false }
          - { label: "语言", name: "lang", widget: "select", options: ["", "zh_CN", "en", "ja", "zh_TW", "ru"], default: "", required: false }
          - { label: "置顶", name: "pinned", widget: "boolean", default: false, required: false }
          - { label: "启用评论", name: "comment", widget: "boolean", default: true, required: false }
          - { label: "作者", name: "author", widget: "string", required: false }
          - { label: "正文", name: "body", widget: "markdown" }

    - name: "spec"
      label: "特殊页面 (Markdown)"
      label_singular: "特殊页面"
      folder: "src/content/spec"
      create: true
      delete: true
      extension: md
      format: frontmatter
      slug: "{{title}}"
      filter: { field: "extension", value: "md" }
      fields:
          - { label: "标题", name: "title", widget: "string" }
          - { label: "描述", name: "description", widget: "text", required: false }
          - { label: "正文", name: "body", widget: "markdown" }

    - name: "spec-mdx"
      label: "特殊页面 (MDX)"
      label_singular: "特殊页面"
      folder: "src/content/spec"
      create: true
      delete: true
      extension: mdx
      format: frontmatter
      slug: "{{title}}"
      filter: { field: "extension", value: "mdx" }
      fields:
          - { label: "标题", name: "title", widget: "string" }
          - { label: "描述", name: "description", widget: "text", required: false }
          - { label: "正文", name: "body", widget: "markdown" }